apiVersion: v1
kind: Namespace
metadata:
  name: database
  labels:
    purpose: shared-infrastructure
---
# Restrict PostgreSQL ingress to Vault (dynamic credential generation)
# and team-data (application database access).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgresql-ingress
  namespace: database
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgresql
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: team-data
      ports:
        - protocol: TCP
          port: 5432
