# ClusterSecretStore — cluster-wide Vault backend for External Secrets Operator.
# This allows ExternalSecret resources in any namespace to fetch secrets from Vault.
#
# The ESO controller authenticates to Vault using the Kubernetes auth method,
# with a dedicated service account in the external-secrets namespace.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
  labels:
    app.kubernetes.io/name: external-secrets
    app.kubernetes.io/component: secret-store
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets"
          serviceAccountRef:
            name: "external-secrets"
            namespace: "external-secrets"
